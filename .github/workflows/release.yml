name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Glyphyx.saver
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: bash build.sh

      - name: Package
        run: |
          cd build
          zip -r Glyphyx.saver.zip Glyphyx.saver

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Glyphyx ${{ github.ref_name }}"
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ## Installation
            1. Download `Glyphyx.saver.zip` below and unzip it
            2. Double-click `Glyphyx.saver` — macOS will offer to install it
            3. Open **System Settings → Screen Saver**, select **Glyphyx**
            4. Click **Options** to configure font, colors, speed, and character set

            > If macOS shows a security warning, right-click the `.saver` file and choose **Open**.
          files: build/Glyphyx.saver.zip
          draft: false
          prerelease: false
